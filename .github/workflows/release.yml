name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: suis-macos-arm64

          - os: macos-13
            target: x86_64-apple-darwin
            asset: suis-macos-amd64

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: suis-linux-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: |
          cargo build --release --package suis-cli --target ${{ matrix.target }}

      - name: Package
        run: |
          cp target/${{ matrix.target }}/release/suis ${{ matrix.asset }}
          chmod +x ${{ matrix.asset }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.asset }}
